# =================================================================
# 🧪 SCRATCHPAD - RÉGLAGES EXPERTS (TEST ORPHELIN)
# ENTITÉ FORCÉE : esp_cuisine
# =================================================================

type: custom:config-template-card
entities:
  - input_boolean.selection_ui_radar
variables:
  # On force le radar 'esp_cuisine' pour le test immédiat
  esp: "'esp_cuisine'"
  is_fast: "states['input_boolean.selection_ui_radar']?.state === 'on'"
card:
  type: vertical-stack
  cards:
    - type: grid
      columns: 2
      square: false
      cards:
        # PORTÉE MOVE (Metamorphique)
        - type: custom:mushroom-number-card
          entity: "${ 'number.' + esp + '_max_move_distance_gate' }"
          name: Portée Move
          icon: mdi:ruler
          display_mode: "${ is_fast ? 'slider' : 'buttons' }"
          icon_color: "${ is_fast ? 'deep-orange' : 'indigo' }"
          tap_action:
            action: call-service
            service: input_boolean.toggle
            target:
              entity_id: input_boolean.selection_ui_radar

        # PORTÉE STILL (Metamorphique)
        - type: custom:mushroom-number-card
          entity: "${ 'number.' + esp + '_max_still_distance_gate' }"
          name: Portée Still
          icon: mdi:ruler
          display_mode: "${ is_fast ? 'slider' : 'buttons' }"
          icon_color: "${ is_fast ? 'deep-orange' : 'indigo' }"
          tap_action:
            action: call-service
            service: input_boolean.toggle
            target:
              entity_id: input_boolean.selection_ui_radar

    # TIMEOUT RADAR (Fixe : Boutons uniquement)
    - type: custom:mushroom-number-card
      entity: "${ 'number.' + esp + '_timeout' }"
      name: Timeout Radar (Matériel)
      icon: mdi:timer-cog-outline
      display_mode: buttons

    # BOUTONS SYSTÈME
    - type: grid
      columns: 2
      square: false
      cards:
        - type: custom:mushroom-entity-card
          entity: "${ 'switch.' + esp + '_engineering_mode' }"
          name: Mode Ingénieur
          icon_color: "${ states['switch.' + esp + '_engineering_mode']?.state === 'on' ? '#2E8B57' : 'disabled' }"
          tap_action:
            action: toggle
        - type: custom:mushroom-entity-card
          entity: "${ 'button.' + esp + '_query_params' }"
          name: Rafraîchir
          icon: mdi:sync
          tap_action:
            action: call-service
            service: button.press
            target:
              entity_id: "${ 'button.' + esp + '_query_params' }"
