# =================================================================
# 🛠️ PACKAGE : CONFIGURATION RADAR LD2410
# Fonction : Helpers pour le pilotage et l'affichage du Dashboard
# =================================================================

input_select:
  liste_esp_ld2410:
    name: "Choisir un radar LD2410"
    icon: mdi:radar
    # -------------------------------------------------------------
    # IMPORTANT : Les options ci-dessous DOIVENT correspondre EXACTEMENT
    # au nom de l'appareil (sans 'sensor.') déclaré dans ESPHome.
    # (ex: si l'ESP s'appelle `esp_sdb`, utilisez exactement `esp_sdb` ici)
    # -------------------------------------------------------------
    options:
      - esp_multi_capteur
      - esp_salon
      - esp_sdb
      - esp_chambre
      - esp_cuisine
    initial: esp_sdb

input_boolean:
  radar_affichage_sliders:
    name: "Affichage des curseurs (Radar)"
    icon: mdi:tune
    initial: off
