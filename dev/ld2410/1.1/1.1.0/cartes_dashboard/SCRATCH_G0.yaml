# =================================================================
# 🧪 SCRATCHPAD - GATE 0 (DÉVELOPPEMENT V1.1.0)
# COMPOSANT : Carte Transformiste (Test Direct)
# ENTITÉ FORCÉE : esp_cuisine
# =================================================================

type: custom:config-template-card
entities:
  - input_boolean.selection_ui_radar
variables:
  # On force le radar 'esp_cuisine' pour le test visuel
  esp: "'esp_cuisine'"
  is_fast: "states['input_boolean.selection_ui_radar']?.state === 'on'"
card:
  type: custom:mushroom-number-card
  entity: "${ 'number.' + esp + '_g0_move_threshold' }"
  name: "G0 (0m)"
  icon: mdi:target-variant
  # Bascule dynamique
  display_mode: "${ is_fast ? 'slider' : 'buttons' }"
  icon_color: "${ is_fast ? 'deep-orange' : 'indigo' }"
  # Action de bascule mode
  tap_action:
    action: call-service
    service: input_boolean.toggle
    target:
      entity_id: input_boolean.selection_ui_radar
