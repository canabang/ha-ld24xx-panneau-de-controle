      # --- ONGLET SYSTÈME ---
      - attributes:
          label: "Système"
        card:
          type: custom:config-template-card
          entities:
            - input_select.liste_esp_ld2410
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state + '_timeout' :
              'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'switch.' +
              states['input_select.liste_esp_ld2410'].state +
              '_engineering_mode' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_max_move_distance_gate' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_max_still_distance_gate' : 'sun.sun' }
          variables:
            esp: >-
              states['input_select.liste_esp_ld2410'] ?
              states['input_select.liste_esp_ld2410'].state : 'esp_salon'
          card:
            type: vertical-stack
            cards:
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:mushroom-number-card
                    entity: "${ 'number.' + esp + '_max_move_distance_gate' }"
                    name: Portée Move
                    display_mode: buttons
                  - type: custom:mushroom-number-card
                    entity: "${ 'number.' + esp + '_max_still_distance_gate' }"
                    name: Portée Still
                    display_mode: buttons
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_timeout' }"
                name: Timeout Radar (Matériel)
                icon: mdi:timer-cog-outline
                display_mode: buttons
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:mushroom-entity-card
                    entity: "${ 'switch.' + esp + '_engineering_mode' }"
                    name: Mode Ingénieur
                    icon_color: >-
                      ${ states['switch.' + esp + '_engineering_mode']?.state
                      === 'on' ? '#2E8B57' : 'disabled' }
                    tap_action:
                      action: toggle
                  - type: custom:mushroom-entity-card
                    entity: "${ 'button.' + esp + '_query_params' }"
                    name: Rafraîchir
                    icon: mdi:sync
                    secondary_info: none
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: "${ 'button.' + esp + '_query_params' }"
                  - type: custom:mushroom-entity-card
                    entity: "${ 'button.' + esp + '_restart_ld' }"
                    name: Reboot Radar
                    icon: mdi:power-cycle
                    icon_color: red
                    secondary_info: none
                    tap_action:
                      action: call-service
                      service: button.press
                      target:
                        entity_id: "${ 'button.' + esp + '_restart_ld' }"
