            cards:
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g0_still_threshold' }"
                name: "G0 (0m)"
                display_mode: "${ is_fast ? 'slider' : 'buttons' }"
                icon_color: blue
                tap_action: { action: more-info }
                double_tap_action: { action: call-service, service: input_boolean.toggle, target: { entity_id: input_boolean.selection_ui_radar } }
              - type: custom:mushroom-number-card
