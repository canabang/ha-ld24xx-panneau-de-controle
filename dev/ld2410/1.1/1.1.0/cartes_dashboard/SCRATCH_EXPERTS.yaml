type: vertical-stack
cards:
  # =================================================================
  # 1. ÉTAT DE PRÉSENCE & SÉLECTEUR
  # =================================================================
  - type: custom:config-template-card
    entities:
      - input_select.liste_esp_ld2410
      - >-
        ${ states['input_select.liste_esp_ld2410'] ? 'binary_sensor.' +
        states['input_select.liste_esp_ld2410'].state + '_presence' : 'sun.sun'
        }
    variables:
      esp: >-
        states['input_select.liste_esp_ld2410'] ?
        states['input_select.liste_esp_ld2410'].state : 'esp_salon'
    card:
      type: vertical-stack
      cards:
        - type: custom:mushroom-select-card
          entity: input_select.liste_esp_ld2410
          name: "Capteur LD2410 Actif"
          icon: mdi:radar
          layout: horizontal
        - type: custom:mushroom-entity-card
          entity: "${ 'binary_sensor.' + esp + '_presence' }"
          name: "Présence Détectée"
          icon: mdi:home-account
          icon_color: >-
            ${ states['binary_sensor.' + esp + '_presence']?.state === 'on' ?
            '#2E8B57' : 'disabled' }
          layout: horizontal
          secondary_info: last-changed

  # =================================================================
  # 4. RÉGLAGES EXPERTS (Structure Ultra-Réactive Mirror)
  # =================================================================
  - type: custom:tabbed-card
    tabs:
      # --- ONGLET MOVE ---
      - attributes:
          label: "Seuils MOVE"
        card:
          type: custom:config-template-card
          entities:
            - input_boolean.selection_ui_radar
            - input_select.liste_esp_ld2410
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g0_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g1_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g2_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g3_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g4_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g5_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g6_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g7_move_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g8_move_threshold' : 'sun.sun' }
          variables:
            esp: >-
              states['input_select.liste_esp_ld2410'] ?
              states['input_select.liste_esp_ld2410'].state : 'esp_salon'
            is_fast: "states['input_boolean.selection_ui_radar']?.state === 'on'"
            res: >-
              parseFloat(states['select.' +
              (states['input_select.liste_esp_ld2410'] ?
              states['input_select.liste_esp_ld2410'].state : 'esp_salon') +
              '_distance_resolution']?.state || 0.75)
          card:
            type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g0_move_threshold' }"
                name: "G0 (0m)"
                display_mode: "${ is_fast ? 'slider' : 'buttons' }"
                icon_color: blue
                tap_action: { action: more-info }
                double_tap_action: { action: call-service, service: input_boolean.toggle, target: { entity_id: input_boolean.selection_ui_radar } }
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g1_move_threshold' }"
                name: "${ 'G1 (' + (1*res).toFixed(2) + 'm)' }"
                display_mode: "${ is_fast ? 'slider' : 'buttons' }"
                icon_color: blue
                tap_action: { action: more-info }
                double_tap_action:
                  {
                    action: call-service,
                    service: input_boolean.toggle,
                    target: { entity_id: input_boolean.selection_ui_radar },
                  }
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g2_move_threshold' }"
                name: "${ 'G2 (' + (2*res).toFixed(2) + 'm)' }"
                display_mode: "${ is_fast ? 'slider' : 'buttons' }"
                icon_color: blue
                tap_action: { action: more-info }
                double_tap_action:
                  {
                    action: call-service,
                    service: input_boolean.toggle,
                    target: { entity_id: input_boolean.selection_ui_radar },
                  }
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g3_move_threshold' }"
                name: "${ 'G3 (' + (3*res).toFixed(2) + 'm)' }"
                display_mode: "${ is_fast ? 'slider' : 'buttons' }"
                icon_color: blue
                tap_action: { action: more-info }
                double_tap_action:
                  {
                    action: call-service,
                    service: input_boolean.toggle,
                    target: { entity_id: input_boolean.selection_ui_radar },
                  }
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g4_move_threshold' }"
                name: "${ 'G4 (' + (4*res).toFixed(2) + 'm)' }"
                display_mode: "${ is_fast ? 'slider' : 'buttons' }"
                icon_color: blue
                tap_action: { action: more-info }
                double_tap_action:
                  {
                    action: call-service,
                    service: input_boolean.toggle,
                    target: { entity_id: input_boolean.selection_ui_radar },
                  }
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g5_move_threshold' }"
                name: "${ 'G5 (' + (5*res).toFixed(2) + 'm)' }"
                display_mode: "${ is_fast ? 'slider' : 'buttons' }"
                icon_color: blue
                tap_action: { action: more-info }
                double_tap_action:
                  {
                    action: call-service,
                    service: input_boolean.toggle,
                    target: { entity_id: input_boolean.selection_ui_radar },
                  }
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g6_move_threshold' }"
                name: "${ 'G6 (' + (6*res).toFixed(2) + 'm)' }"
                display_mode: "${ is_fast ? 'slider' : 'buttons' }"
                icon_color: blue
                tap_action: { action: more-info }
                double_tap_action:
                  {
                    action: call-service,
                    service: input_boolean.toggle,
                    target: { entity_id: input_boolean.selection_ui_radar },
                  }
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g7_move_threshold' }"
                name: "${ 'G7 (' + (7*res).toFixed(2) + 'm)' }"
                display_mode: "${ is_fast ? 'slider' : 'buttons' }"
                icon_color: blue
                tap_action: { action: more-info }
                double_tap_action: { action: call-service, service: input_boolean.toggle, target: { entity_id: input_boolean.selection_ui_radar } }
              - type: custom:mushroom-number-card
                entity: "${ 'number.' + esp + '_g8_move_threshold' }"
                name: "${ 'G8 (' + (8*res).toFixed(2) + 'm)' }"
                display_mode: "${ is_fast ? 'slider' : 'buttons' }"
                icon_color: blue
                tap_action: { action: more-info }
                double_tap_action: { action: call-service, service: input_boolean.toggle, target: { entity_id: input_boolean.selection_ui_radar } }

      # --- ONGLET STILL ---
      - attributes:
          label: "Seuils STILL"
        card:
          type: custom:config-template-card
          entities:
            - input_boolean.selection_ui_radar
            - input_select.liste_esp_ld2410
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g0_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g1_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g2_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g3_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g4_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g5_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g6_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g7_still_threshold' : 'sun.sun' }
            - >-
              ${ states['input_select.liste_esp_ld2410'] ? 'number.' +
              states['input_select.liste_esp_ld2410'].state +
              '_g8_still_threshold' : 'sun.sun' }
          variables:
            esp: >-
              states['input_select.liste_esp_ld2410'] ?
              states['input_select.liste_esp_ld2410'].state : 'esp_salon'
            is_fast: "states['input_boolean.selection_ui_radar']?.state === 'on'"
            res: >-
              parseFloat(states['select.' +
              (states['input_select.liste_esp_ld2410'] ?
              states['input_select.liste_esp_ld2410'].state : 'esp_salon') +
