input_select:
  selection_radar_ld2410:
    name: "Sélection du Radar LD2410"
    icon: mdi:radar
    # -------------------------------------------------------------
    # IMPORTANT : Les options ci-dessous DOIVENT correspondre EXACTEMENT
    # au nom de l'appareil (sans 'sensor.') déclaré dans ESPHome.
    # -------------------------------------------------------------
    options:
      - A_CHANGER_NOM_APPAREIL_1
      - A_CHANGER_NOM_APPAREIL_2
      - A_CHANGER_NOM_APPAREIL_3
    initial: A_CHANGER_NOM_APPAREIL_1

input_boolean:
  radar_affichage_sliders:
    name: "Affichage des curseurs (Radar)"
    icon: mdi:tune
    initial: false
